  </defs>
  <rect width="1600" height="900" fill="url(#g)"/>
  <rect width="1600" height="900" fill="url(#v)"/>
  <rect width="1600" height="900" filter="url(#grain)" opacity="0.55"/>
  <g opacity="0.72">
    <rect x="205" y="178" width="520" height="330" rx="28" fill="#020617" opacity="0.42"/>
    <rect x="752" y="280" width="610" height="360" rx="34" fill="#f8fafc" opacity="0.08"/>
    <circle cx="1085" cy="265" r="94" fill="#fff7ed" opacity="0.18"/>
  </g>
  <path d="M0 710 C260 640 420 780 700 710 S1190 650 1600 735 L1600 900 L0 900 Z" fill="#020617" opacity="0.5"/>
  <text x="96" y="760" fill="#f8fafc" font-family="Arial, sans-serif" font-size="42" font-weight="700">cadrages IA vidéo</text>
  <text x="98" y="815" fill="#cbd5e1" font-family="Arial, sans-serif" font-size="24">AI Studios, rendu local cinématique, grain naturel</text>
